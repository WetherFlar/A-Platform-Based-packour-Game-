<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>A Platform-Based Packour Game</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<style>
    body{margin:0;background:#222;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Segoe UI',sans-serif;touch-action:manipulation;user-select:none;overflow:hidden;}
    canvas{border:2px solid #555;border-radius:8px;width:100vw;height:100vh;max-width:100vw;max-height:100vh;}
    .info{position:absolute;bottom:10px;color:#aaa;font-size:12px;text-align:center;width:100%;pointer-events:none;z-index:10;}
    .touch-controls{position:absolute;bottom:30px;left:20px;display:flex;gap:12px;pointer-events:none;}
    .touch-btn{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.6);border:none;font-size:28px;color:#333;font-weight:bold;display:flex;justify-content:center;align-items:center;pointer-events:auto;user-select:none;}
    .touch-btn:active{background:rgba(255,255,255,0.8);}
    .jump-btn{position:absolute;bottom:30px;right:20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.65);border:none;font-size:32px;color:#333;font-weight:bold;display:flex;justify-content:center;align-items:center;pointer-events:auto;user-select:none;}
    .jump-btn:active{background:rgba(255,255,255,0.9);}
    #tool-panel{position:absolute;bottom:130px;right:20px;display:flex;flex-direction:column;gap:8px;pointer-events:none;z-index:10;}
    .tool-btn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,0.55);border:none;font-size:24px;line-height:46px;text-align:center;pointer-events:auto;user-select:none;}
    .tool-btn.active{background:rgba(255,255,255,0.9);}
    #overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);color:#fff;font-size:22px;display:none;justify-content:center;align-items:center;flex-direction:column;z-index:9999;}
    #overlay div{margin-top:10px;display:flex;gap:10px;}
    #overlay button{margin-top:6px;padding:8px 18px;font-size:16px;cursor:pointer;border-radius:6px;border:none;background:#f0d060;color:#222;}
    #menu-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);color:#fff;display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:10001;}
    #menu-overlay h2{margin-bottom:20px;}
    #menu-overlay button{margin:8px;padding:12px 28px;font-size:20px;cursor:pointer;border-radius:8px;border:none;background:#4caf50;color:#fff;}
    #loader{position:absolute;top:0;left:0;width:100%;height:100%;background:#111;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;font-size:20px;z-index:10000;}
    .progress{width:80%;height:16px;background:#444;margin-top:16px;border-radius:8px;overflow:hidden;}
    .progress-bar{width:0%;height:100%;background:#4caf50;transition:width .2s;}
    #settings-btn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.5);border:none;font-size:20px;cursor:pointer;z-index:10;}
    #settings-panel{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,0.9);color:#ddd;padding:12px;border-radius:10px;display:none;flex-direction:column;gap:6px;font-size:13px;z-index:10001;min-width:240px;}
    #settings-panel label{display:flex;justify-content:space-between;align-items:center;}
    #settings-panel input[type=number]{width:60px;padding:2px 4px;border-radius:4px;border:none;text-align:right;}
    #settings-panel button{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:12px;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="info">← → Move | ↑ Jump | G/B/F Props | the buttons for mobile is on the downside of the screen</div>

<div class="touch-controls">
    <button id="btn-left"  class="touch-btn">←</button>
    <button id="btn-right" class="touch-btn">→</button>
</div>
<button id="btn-jump" class="jump-btn">⇧</button>

<div id="tool-panel">
    <button id="tool-grapple" class="tool-btn" title="Hook">🪝</button>
    <button id="tool-block"   class="tool-btn" title="Block">🧱</button>
    <button id="tool-wings"   class="tool-btn" title="Wings">🪶</button>
</div>

<button id="settings-btn">⚙️</button>

<div id="settings-panel">
    <label>Gravity <input type="number" id="cfg-gravity" value="1000" step="50"></label>
    <label>Speed <input type="number" id="cfg-speed" value="250" step="10"></label>
    <label>Jump <input type="number" id="cfg-jump" value="420" step="10"></label>
    <label>Gliding Time <input type="number" id="cfg-glideTime" value="1.5" step="0.1"></label>
    <label>Gliding Speed <input type="number" id="cfg-glideSpeed" value="180" step="10"></label>
    <label>Hook <input type="number" id="cfg-grapple" value="700" step="50"></label>
    <button id="cfg-reset">Reset</button>
</div>

<div id="overlay">
    <span id="msg"></span>
    <div>
        <button id="btn-retry-same">Replay This Map</button>
        <button id="btn-restart-new">Regenerate A New Map</button>
    </div>
</div>

<div id="menu-overlay">
    <h2>Chose A Way</h2>
    <button id="btn-mode-speedrun">🏁 Fast Play</button>
    <button id="btn-mode-infinite">♾️ Infinite</button>
</div>

<div id="loader"><div>Loading…</div><div class="progress"><div class="progress-bar"></div></div></div>

<script>
(async function(){
const LOGIC_W = 800, LOGIC_H = 450;
let GRAVITY=1000, PLAYER_SPEED=250, JUMP_VELOCITY=-420;
let GLIDE_TIME=1.5, GLIDE_SPEED=-180, GRAPPLE_SPEED=700;
let MAX_JUMP_HEIGHT=Math.pow(-JUMP_VELOCITY,2)/(2*GRAVITY);
let MAX_JUMP_TIME=2*Math.abs(JUMP_VELOCITY)/GRAVITY;
let MAX_JUMP_HORIZONTAL=PLAYER_SPEED*MAX_JUMP_TIME;

const PLAYER_W=22, PLAYER_H=30, DEFAULT_WORLD_H=450;
const canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
canvas.width=LOGIC_W; canvas.height=LOGIC_H;
const overlay=document.getElementById('overlay'), msgSpan=document.getElementById('msg');
const menuOverlay=document.getElementById('menu-overlay');
const toolPanel=document.getElementById('tool-panel');
const btnGrapple=document.getElementById('tool-grapple');
const btnBlock=document.getElementById('tool-block');
const btnWings=document.getElementById('tool-wings');
const loader=document.getElementById('loader'), progressBar=document.querySelector('.progress-bar');

let WORLD_W, WORLD_H=DEFAULT_WORLD_H;
let player, platforms, movingPlatforms, monsters, coins, items, goal;
let camera, score, gameState='PLAY';
let btnLeft=false, btnRight=false, btnJump=false;
let standingOnMoving=null, grappleTarget=null, mouseWorldPos={x:0,y:0};
let prevKeys={}, grappleReady=false;
let animationId=null, lastTime=performance.now();
const pendingTimeouts=[];
let clouds=[], trees=[], mountains=[];
let gameMode='speedrun', currentSeed;
let elapsedTime=0;

let SEED, rand;
function createRNG(seed){ let s=seed>>>0; return()=>{ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }
function overlap(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }

function resize(){
    const vw=window.innerWidth, vh=window.innerHeight;
    const ratio=LOGIC_W/LOGIC_H;
    if(vw/vh>ratio){ canvas.style.height=vh+'px'; canvas.style.width=(vh*ratio)+'px'; }
    else{ canvas.style.width=vw+'px'; canvas.style.height=(vw/ratio)+'px'; }
}
window.addEventListener('resize',resize); resize();

function bindBtn(id,setter){
    const el=document.getElementById(id);
    const down=e=>{e.preventDefault();setter(true);}, up=e=>{e.preventDefault();setter(false);};
    el.addEventListener('mousedown',down); el.addEventListener('touchstart',down);
    el.addEventListener('mouseup',up); el.addEventListener('mouseleave',up);
    el.addEventListener('touchend',up); el.addEventListener('touchcancel',up);
}
bindBtn('btn-left', v=>btnLeft=v); bindBtn('btn-right',v=>btnRight=v); bindBtn('btn-jump',v=>btnJump=v);
document.getElementById('btn-restart-new').addEventListener('click',()=>{ newMap(); });
document.getElementById('btn-retry-same').addEventListener('click',()=>{ retrySameMap(); });

const keys={};
window.addEventListener('keydown',e=>{ keys[e.code]=true;
    if(['Space','ArrowUp','KeyW','KeyG','KeyB','KeyF'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
function isLeft(){ return keys['ArrowLeft']||keys['KeyA']||btnLeft; }
function isRight(){ return keys['ArrowRight']||keys['KeyD']||btnRight; }
function isJump(){ return keys['Space']||keys['ArrowUp']||keys['KeyW']||btnJump; }

function updateMouseWorld(e){
    const rect=canvas.getBoundingClientRect();
    mouseWorldPos.x=(e.clientX-rect.left)*LOGIC_W/rect.width+camera.x;
    mouseWorldPos.y=(e.clientY-rect.top)*LOGIC_H/rect.height+camera.y;
}
canvas.addEventListener('click',e=>{updateMouseWorld(e);
    if(grappleReady&&player.hasGrapple){ grappleTarget={x:mouseWorldPos.x,y:mouseWorldPos.y}; grappleReady=false; btnGrapple.classList.remove('active'); }
});
canvas.addEventListener('touchstart',e=>{const t=e.touches[0];updateMouseWorld(t);
    if(grappleReady&&player.hasGrapple){ grappleTarget={x:mouseWorldPos.x,y:mouseWorldPos.y}; grappleReady=false; btnGrapple.classList.remove('active'); }
});

/* 参数面板 */
const settingsPanel=document.getElementById('settings-panel');
document.getElementById('settings-btn').addEventListener('click',()=>{settingsPanel.style.display=settingsPanel.style.display==='flex'?'none':'flex';});
function applySettings(){
    GRAVITY=parseFloat(document.getElementById('cfg-gravity').value)||1000;
    PLAYER_SPEED=parseFloat(document.getElementById('cfg-speed').value)||250;
    JUMP_VELOCITY=-(parseFloat(document.getElementById('cfg-jump').value)||420);
    GLIDE_TIME=parseFloat(document.getElementById('cfg-glideTime').value)||1.5;
    GLIDE_SPEED=-(parseFloat(document.getElementById('cfg-glideSpeed').value)||180);
    GRAPPLE_SPEED=parseFloat(document.getElementById('cfg-grapple').value)||700;
    MAX_JUMP_HEIGHT=Math.pow(-JUMP_VELOCITY,2)/(2*GRAVITY);
    MAX_JUMP_TIME=2*Math.abs(JUMP_VELOCITY)/GRAVITY;
    MAX_JUMP_HORIZONTAL=PLAYER_SPEED*MAX_JUMP_TIME;
}
for(const id of ['cfg-gravity','cfg-speed','cfg-jump','cfg-glideTime','cfg-glideSpeed','cfg-grapple']){
    document.getElementById(id).addEventListener('input',applySettings);
}
document.getElementById('cfg-reset').addEventListener('click',()=>{
    document.getElementById('cfg-gravity').value=1000;
    document.getElementById('cfg-speed').value=250;
    document.getElementById('cfg-jump').value=420;
    document.getElementById('cfg-glideTime').value=1.5;
    document.getElementById('cfg-glideSpeed').value=180;
    document.getElementById('cfg-grapple').value=700;
    applySettings();
});

function canReach(src,dst){
    const dx=Math.abs((src.x+src.w/2)-(dst.x+dst.w/2));
    const dy=src.y-dst.y;
    return dx<=MAX_JUMP_HORIZONTAL&&dy<=MAX_JUMP_HEIGHT&&dy>=0;
}

/* ───────── Generate the Main Road ───────── */
function generateMainPath(){
    platforms=[{x:0,y:400,w:1200,h:80,type:'solid'}];
    let curX=1200, curY=330;
    const steps = gameMode==='infinite' ? 30 : 12;
    for(let i=0;i<steps;i++){
        const w=70+Math.floor(rand()*100);
        const gap=60+Math.floor(rand()*90);
        const targetX=curX+gap;
        const maxDy=Math.min(MAX_JUMP_HEIGHT,100);
        const dy=-(15+Math.floor(rand()*maxDy));
        const targetY=curY+dy;
        const src={x:curX-platforms[platforms.length-1].w,y:curY,w:platforms[platforms.length-1].w};
        const dst={x:targetX,y:targetY,w:w,h:12,type:'solid'};
        if(!canReach(src,dst)) return false;
        platforms.push(dst); curX=targetX+w; curY=targetY;
    }
    const last=platforms[platforms.length-1];
    if(gameMode==='speedrun'){
        goal={x:last.x+last.w+130, y:Math.max(last.y-60,80), w:36, h:50, type:'goal'};
    }else{ goal=null; }
    WORLD_W=curX+600;
    return true;
}

/* ───────── Safety Placing (based on platforms) ───────── */
function getRandomSolidPlatform(){
    const solids = platforms.filter(p=>p.type==='solid');
    return solids[Math.floor(rand()*solids.length)];
}

/* Safety place a stuff on specific platforms，send back {x,y} */
function placeAbovePlatform(plat, offsetYMin, offsetYMax){
    const x = plat.x + 10 + Math.floor(rand() * (plat.w - 20));
    const y = plat.y - (offsetYMin + Math.floor(rand() * (offsetYMax - offsetYMin)));
    return {x, y};
}

/* ───────── Randomly Filled ───────── */
function fillRandomElements(){
    // More Platforms
    for(let i=0;i<18;i++){
        const w=70+Math.floor(rand()*120);
        const x=60+Math.floor(rand()*(WORLD_W-140));
        const y=200+Math.floor(rand()*180);
        platforms.push({x,y,w,h:12,type:'solid'});
    }
    // 长平地
    for(let i=0;i<3;i++){
        const y=280+Math.floor(rand()*120);
        const x=200+Math.floor(rand()*(WORLD_W-500));
        platforms.push({x,y,w:300+Math.floor(rand()*200),h:12,type:'solid'});
    }

    movingPlatforms=[];
    const solids=platforms.filter(p=>p.type==='solid');
    for(let i=0;i<3;i++){
        const base=solids[Math.floor(rand()*solids.length)];
        movingPlatforms.push({x:base.x,y:base.y-12,w:80,h:12,type:'moving',startX:base.x,endX:base.x+200,speed:120,dir:1,dx:0});
    }
    monsters=[];
    for(let i=0;i<3;i++){
        const base=solids[Math.floor(rand()*solids.length)];
        monsters.push({x:base.x+30,y:base.y-26,w:26,h:26,speed:90,dir:1,startX:base.x,endX:base.x+base.w-26,type:'monster'});
    }

    /* ─── Pennies：All above the platforms ─── */
    coins=[];
    for(let i=0;i<16;i++){
        const plat = getRandomSolidPlatform();
        const pos = placeAbovePlatform(plat, 20, 80);
        coins.push({x:pos.x, y:pos.y, r:5, collected:false});
    }

    /* ─── Props：Spawn one for every kind and put them on the platforms ─── */
    items=[];
    const itemTypes = ['grapple','block','wings'];
    for(const t of itemTypes){
        const plat = getRandomSolidPlatform();
        const pos = placeAbovePlatform(plat, 25, 70);
        items.push({x:pos.x, y:pos.y, type:t, collected:false});
    }

    /* ─── the Key：safety place ─── */
    const keyPlat = getRandomSolidPlatform();
    const keyPos = placeAbovePlatform(keyPlat, 30, 80);
    items.push({x:keyPos.x, y:keyPos.y, type:'key', collected:false});

    /* ─── Locked Door：Set on the right part of the main road ─── */
    const mainPlats = platforms.slice(0, gameMode==='speedrun'?13:31);
    const lockPlat = mainPlats[Math.floor(mainPlats.length*0.65)];
    const lockX = lockPlat.x + lockPlat.w/2 - 10;
    const lockY = lockPlat.y - 70;   // the door is 80px high
    platforms.push({x:lockX, y:lockY, w:20, h:80, type:'lock'});
}

function generateDecorations(){
    clouds=[]; for(let i=0;i<8;i++) clouds.push({x:Math.random()*WORLD_W,y:20+Math.random()*100,w:50+Math.random()*60,h:16+Math.random()*14,speed:15+Math.random()*25});
    mountains=[]; for(let i=0;i<8;i++) mountains.push({x:i*130-Math.random()*40,y:LOGIC_H-120+Math.random()*40,w:80+Math.random()*60,h:60+Math.random()*80});
    trees=[]; for(let x=100;x<WORLD_W-200;x+=150+Math.floor(rand()*180)) trees.push({x,y:400-50});
    const solids=platforms.filter(p=>p.type==='solid'&&p.y<380);
    for(let i=0;i<Math.min(solids.length,10);i++) trees.push({x:solids[i].x+20,y:solids[i].y-48});
}

function setProgress(p){ progressBar.style.width=p+'%'; }

async function initGame(){
    SEED=currentSeed; rand=createRNG(SEED);
    let ok=false; for(let i=0;i<12&&!ok;i++) ok=generateMainPath();
    if(!ok){ platforms=[{x:0,y:400,w:1200,h:80,type:'solid'}]; WORLD_W=2000; goal=gameMode==='speedrun'?{x:1700,y:280,w:36,h:50,type:'goal'}:null; }
    fillRandomElements(); generateDecorations();
    score=0; elapsedTime=0; gameState='PLAY'; overlay.style.display='none';
    player={x:100,y:200,vx:0,vy:0,w:PLAYER_W,h:PLAYER_H, onGround:false,facingRight:true,
            hasGrapple:false,hasBlock:false,hasWings:false,hasKey:false, isGliding:false,glideTimer:0};
    camera={x:0,y:0};
    grappleTarget=null; grappleReady=false; standingOnMoving=null; prevKeys={};
    updateToolUI();
}

async function startGame(){
    stopGame(); pendingTimeouts.forEach(id=>clearTimeout(id)); pendingTimeouts.length=0;
    loader.style.display='flex'; setProgress(0);
    await new Promise(r=>{let id=setTimeout(r,0);pendingTimeouts.push(id);});
    setProgress(30); await initGame(); setProgress(100);
    await new Promise(r=>{let id=setTimeout(r,200);pendingTimeouts.push(id);});
    loader.style.display='none';
    lastTime=performance.now();
    animationId=requestAnimationFrame(gameLoop);
}

function newMap(){ currentSeed=Math.floor(Math.random()*0x7fffffff); startGame(); }
function retrySameMap(){ startGame(); }
function stopGame(){ if(animationId!==null){ cancelAnimationFrame(animationId); animationId=null; } }

function updateToolUI(){
    const any=player.hasGrapple||player.hasBlock||player.hasWings||player.hasKey;
    toolPanel.style.display=any?'flex':'none';
    btnGrapple.style.display=player.hasGrapple?'inline-block':'none';
    btnBlock.style.display=player.hasBlock?'inline-block':'none';
    btnWings.style.display=player.hasWings?'inline-block':'none';
    btnGrapple.classList.remove('active');
}
btnGrapple.addEventListener('click',e=>{e.stopPropagation();if(!player.hasGrapple)return;grappleReady=true;btnGrapple.classList.add('active');});
btnBlock.addEventListener('click',e=>{e.stopPropagation();if(!player.hasBlock)return;const plat={x:player.x-25,y:player.y+player.h,w:100,h:12,type:'solid'};platforms.push(plat);player.y=plat.y-player.h;player.onGround=true;});
btnWings.addEventListener('click',e=>{e.stopPropagation();if(!player.hasWings)return;player.isGliding=true;player.glideTimer=GLIDE_TIME;});

/* ───────── Refresh ───────── */
function updateMovingPlatforms(dt){ for(const p of movingPlatforms){ const o=p.x; p.x+=p.speed*p.dir*dt; if(p.x>p.endX){p.x=p.endX;p.dir=-1;} else if(p.x<p.startX){p.x=p.startX;p.dir=1;} p.dx=p.x-o; } }
function updateMonsters(dt){ for(const m of monsters){ m.x+=m.speed*m.dir*dt; if(m.x>m.endX){m.x=m.endX;m.dir=-1;} else if(m.x<m.startX){m.x=m.startX;m.dir=1;} } }
function updateClouds(dt){ for(const c of clouds){ c.x-=c.speed*dt; if(c.x+c.w<0) c.x=WORLD_W+100; } }

function handleGrapple(dt){
    if(!grappleTarget) return;
    const dx=grappleTarget.x-player.x, dy=grappleTarget.y-player.y, dist=Math.hypot(dx,dy);
    if(dist<GRAPPLE_SPEED*dt){ player.x=grappleTarget.x; player.y=grappleTarget.y; grappleTarget=null; player.vx=player.vy=0; }
    else{ const nx=dx/dist, ny=dy/dist; player.x+=nx*GRAPPLE_SPEED*dt; player.y+=ny*GRAPPLE_SPEED*dt; player.vx=nx*GRAPPLE_SPEED; player.vy=ny*GRAPPLE_SPEED; }
}

function movePlayer(dt){
    let inp=0; if(isLeft()) inp-=1; if(isRight()) inp+=1;
    player.vx=inp*PLAYER_SPEED; if(inp>0) player.facingRight=true; else if(inp<0) player.facingRight=false;
    if(player.isGliding){ player.vy=GLIDE_SPEED; player.glideTimer-=dt; if(player.glideTimer<=0) player.isGliding=false; }
    else player.vy+=GRAVITY*dt;
    if(isJump()&&player.onGround){ player.vy=JUMP_VELOCITY; player.onGround=false; }

    const allPlat=[...platforms,...movingPlatforms];
    const newX=player.x+player.vx*dt;
    const horiz={x:newX,y:player.y,w:player.w,h:player.h};
    let blockedX=false;
    for(const p of allPlat){
        if(p.type==='oneway') continue;
        if(p.type==='lock' && player.hasKey) continue;
        if(!overlap(horiz,p)) continue;
        blockedX=true;
        if(player.vx>0) player.x=p.x-player.w; else if(player.vx<0) player.x=p.x+p.w;
        player.vx=0; break;
    }
    if(!blockedX) player.x=newX;

    let newY=player.y+player.vy*dt;
    let landed=false; standingOnMoving=null;
    const pl=player.x, pr=player.x+player.w, pt=player.y, pb=player.y+player.h;
    for(const p of allPlat){
        if(pr<=p.x||pl>=p.x+p.w) continue;
        if(p.type==='lock' && player.hasKey) continue;
        if(player.vy>0){
            const platTop=p.y;
            if(pb<=platTop&&newY+player.h>platTop){
                if(p.type==='oneway'){ if(pb<=platTop+2){ newY=platTop-player.h; player.vy=0; landed=true; break; } }
                else{ newY=platTop-player.h; player.vy=0; landed=true; if(p.type==='moving') standingOnMoving=p; break; }
            }
        }else if(player.vy<0){
            const platBottom=p.y+p.h;
            if(pt>=platBottom&&newY<platBottom){ if(p.type!=='oneway'){ newY=platBottom; player.vy=0; break; } }
        }
    }
    if(!landed) player.y=newY;
    player.onGround=landed;
    if(player.x<0){player.x=0;player.vx=0;}
    if(player.x+player.w>WORLD_W){player.x=WORLD_W-player.w;player.vx=0;}
    if(player.y>WORLD_H){gameState='GAMEOVER';}
}

function followMovingPlatform(){ if(standingOnMoving) player.x+=standingOnMoving.dx; }
function checkItems(){
    for(const it of items){
        if(it.collected) continue;
        const dx=(player.x+player.w/2)-it.x, dy=(player.y+player.h/2)-it.y;
        if(dx*dx+dy*dy<11*11){
            it.collected=true;
            if(it.type==='grapple') player.hasGrapple=true;
            else if(it.type==='block') player.hasBlock=true;
            else if(it.type==='wings') player.hasWings=true;
            else if(it.type==='key') player.hasKey=true;
            updateToolUI();
        }
    }
}
function checkCoins(){ for(const c of coins){ if(c.collected) continue; const dx=(player.x+player.w/2)-c.x, dy=(player.y+player.h/2)-c.y; if(dx*dx+dy*dy<(c.r+10)*(c.r+10)){ c.collected=true; score+=50; } } }
function checkMonsters(){ for(const m of monsters) if(overlap({x:player.x,y:player.y,w:player.w,h:player.h},m)){ gameState='GAMEOVER'; return; } }
function checkGoal(){ if(goal&&overlap({x:player.x,y:player.y,w:player.w,h:player.h},goal)) gameState='WIN'; }

function updateCamera(){
    const tx=player.x-LOGIC_W/2+PLAYER_W/2, ty=player.y-LOGIC_H/2+PLAYER_H/2-20;
    camera.x=Math.max(0,Math.min(WORLD_W-LOGIC_W,tx));
    camera.y=Math.max(0,Math.min(WORLD_H-LOGIC_H,ty));
}

/* ───────── Rendering ───────── */
function drawBackground(){ const g=ctx.createLinearGradient(0,0,0,LOGIC_H); g.addColorStop(0,'#87CEEB'); g.addColorStop(1,'#c8e6c9'); ctx.fillStyle=g; ctx.fillRect(0,0,LOGIC_W,LOGIC_H); }
function drawMountains(){ for(const m of mountains){ const sx=m.x-camera.x*0.3; if(sx<-m.w*2||sx>LOGIC_W+m.w*2) continue; ctx.fillStyle='rgba(100,120,140,0.45)'; ctx.beginPath(); ctx.moveTo(sx-m.w/2,LOGIC_H); ctx.lineTo(sx,m.y-m.h); ctx.lineTo(sx+m.w/2,LOGIC_H); ctx.closePath(); ctx.fill(); } }
function drawClouds(){ for(const c of clouds){ const sx=c.x-camera.x, sy=c.y-camera.y; if(sx<-c.w||sx>LOGIC_W+c.w) continue; ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.beginPath(); ctx.ellipse(sx,sy,c.w/2,c.h/2,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(sx-c.w*0.25,sy+c.h*0.1,c.w*0.3,c.h*0.35,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(sx+c.w*0.2,sy-c.h*0.15,c.w*0.25,c.h*0.3,0,0,Math.PI*2); ctx.fill(); } }
function drawTrees(){ for(const t of trees){ const sx=t.x-camera.x, sy=t.y-camera.y; if(sx<-40||sx>LOGIC_W+40) continue; ctx.fillStyle='#8B5A2B'; ctx.fillRect(sx-5,sy+18,10,35); ctx.fillStyle='#2E8B57'; ctx.beginPath(); ctx.moveTo(sx-18,sy+18); ctx.lineTo(sx,sy-12); ctx.lineTo(sx+18,sy+18); ctx.closePath(); ctx.fill(); ctx.fillStyle='#3CB371'; ctx.beginPath(); ctx.moveTo(sx-14,sy+8); ctx.lineTo(sx,sy-18); ctx.lineTo(sx+14,sy+8); ctx.closePath(); ctx.fill(); } }
function drawPlatforms(){ for(const p of [...platforms,...movingPlatforms]){ const sx=p.x-camera.x, sy=p.y-camera.y; if(sx<-p.w||sx>LOGIC_W+p.w||sy<-p.h||sy>LOGIC_H+p.h) continue; if(p.type==='lock'){ ctx.fillStyle='#cc2222'; ctx.fillRect(sx,sy,p.w,p.h); ctx.strokeStyle='#880000'; ctx.strokeRect(sx,sy,p.w,p.h); }else{ ctx.fillStyle=(p.type==='oneway')?'#c8956c':'#6B8E23'; ctx.fillRect(sx,sy,p.w,p.h); ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(sx,sy,p.w,3); ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.strokeRect(sx,sy,p.w,p.h); } } }
function drawMonsters(){ for(const m of monsters){ const sx=m.x-camera.x, sy=m.y-camera.y; if(sx<-m.w||sx>LOGIC_W+m.w) continue; ctx.fillStyle='#FF4444'; ctx.beginPath(); ctx.ellipse(sx+m.w/2,sy+m.h*0.7,m.w/2,m.h/2,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.ellipse(sx+m.w*0.3,sy+m.h*0.45,m.w*0.12,m.h*0.12,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(sx+m.w*0.7,sy+m.h*0.45,m.w*0.12,m.h*0.12,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(sx+m.w*0.32,sy+m.h*0.46,m.w*0.05,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(sx+m.w*0.72,sy+m.h*0.46,m.w*0.05,0,Math.PI*2); ctx.fill(); } }
function drawCoins(){ for(const c of coins){ if(c.collected) continue; const sx=c.x-camera.x, sy=c.y-camera.y; ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(sx,sy,c.r,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#B8860B'; ctx.stroke(); } }
function drawItems(){ for(const it of items){ if(it.collected) continue; const sx=it.x-camera.x, sy=it.y-camera.y; if(it.type==='grapple'){ ctx.fillStyle='#9b59b6'; ctx.beginPath(); ctx.arc(sx,sy,9,0,Math.PI*2); ctx.fill(); } else if(it.type==='block'){ ctx.fillStyle='#1abc9c'; ctx.fillRect(sx-8,sy-8,16,16); } else if(it.type==='wings'){ ctx.fillStyle='#3498db'; ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(sx-10,sy+6); ctx.lineTo(sx-10,sy-6); ctx.closePath(); ctx.fill(); } else if(it.type==='key'){ ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#FFA500'; ctx.fillRect(sx-3,sy-3,4,10); } } }
function drawGoal(){ if(!goal) return; const sx=goal.x-camera.x, sy=goal.y-camera.y; ctx.fillStyle='#FF8C00'; ctx.fillRect(sx,sy,goal.w,goal.h); ctx.strokeStyle='#FF4500'; ctx.strokeRect(sx,sy,goal.w,goal.h); ctx.fillStyle='#FFFF00'; ctx.beginPath(); ctx.moveTo(sx+goal.w,sy); ctx.lineTo(sx+goal.w+10,sy+goal.h/2); ctx.lineTo(sx+goal.w,sy+goal.h); ctx.closePath(); ctx.fill(); }
function drawPlayer(){
    const sx=player.x-camera.x, sy=player.y-camera.y, dir=player.facingRight?1:-1;
    ctx.fillStyle='#E67E22'; ctx.fillRect(sx+2,sy+8,PLAYER_W-4,PLAYER_H-10);
    ctx.fillStyle='#F5CBA7'; ctx.beginPath(); ctx.arc(sx+PLAYER_W/2,sy+5,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#E74C3C'; ctx.beginPath(); ctx.ellipse(sx+PLAYER_W/2,sy+2,8,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillRect(sx+PLAYER_W/2-2,sy-5,4,7);
    const eyeX=sx+PLAYER_W/2+dir*3;
    ctx.fillStyle='#FFF'; ctx.beginPath(); ctx.arc(eyeX,sy+3,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(eyeX+dir*0.8,sy+3,1.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#F5CBA7'; ctx.fillRect(sx-2,sy+9,3,6); ctx.fillRect(sx+PLAYER_W-1,sy+9,3,6);
    ctx.fillStyle='#34495E'; ctx.fillRect(sx+2,sy+PLAYER_H-6,5,7); ctx.fillRect(sx+PLAYER_W-7,sy+PLAYER_H-6,5,7);
}
function drawUI(){
    ctx.fillStyle='#fff'; ctx.font='bold 16px sans-serif'; ctx.textAlign='left';
    ctx.fillText(`⭐ ${score}`,10,24);
    ctx.fillText(`⏱ ${elapsedTime.toFixed(1)}s`,10,44);
    let sk=''; if(player.hasGrapple) sk+='🪝 '; if(player.hasBlock) sk+='🧱 '; if(player.hasWings) sk+='🪶 '; if(player.hasKey) sk+='🔑 ';
    if(sk) ctx.fillText(sk,10,64);
}

function gameLoop(now){
    let dt=(now-lastTime)/1000; if(dt<=0) dt=0.016; if(dt>0.1) dt=0.1; lastTime=now;
    if(gameState==='PLAY'){
        if(gameMode==='speedrun') elapsedTime+=dt;
        updateMovingPlatforms(dt); updateMonsters(dt); updateClouds(dt);
        const pressed=code=>keys[code]&&!prevKeys[code];
        if(pressed('KeyG')&&player.hasGrapple){ grappleReady=true; btnGrapple.classList.add('active'); }
        if(pressed('KeyB')&&player.hasBlock){ const plat={x:player.x-25,y:player.y+player.h,w:100,h:12,type:'solid'}; platforms.push(plat); player.y=plat.y-player.h; player.onGround=true; }
        if(pressed('KeyF')&&player.hasWings){ player.isGliding=true; player.glideTimer=GLIDE_TIME; }
        if(grappleTarget) handleGrapple(dt); else movePlayer(dt);
        followMovingPlatform(); checkCoins(); checkItems(); checkMonsters(); checkGoal(); updateCamera();
    }
    ctx.clearRect(0,0,LOGIC_W,LOGIC_H);
    drawBackground(); drawMountains(); drawClouds(); drawTrees(); drawPlatforms();
    drawMonsters(); drawCoins(); drawItems(); drawGoal(); drawPlayer(); drawUI();
    if(gameState!=='PLAY'){ overlay.style.display='flex'; msgSpan.textContent=(gameState==='WIN')?`Succeed！ 🎉 Used ${elapsedTime.toFixed(1)}s`:'Game over 😢'; }
    prevKeys={...keys};
    animationId=requestAnimationFrame(gameLoop);
}

document.getElementById('btn-mode-speedrun').addEventListener('click',()=>{ gameMode='speedrun'; menuOverlay.style.display='none'; newMap(); });
document.getElementById('btn-mode-infinite').addEventListener('click',()=>{ gameMode='infinite'; menuOverlay.style.display='none'; newMap(); });
})();
</script>
